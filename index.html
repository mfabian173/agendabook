<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Lab Desk</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="desktop">


<header id="topBar">

    <div class="title">
        🌸 My Lab Desk
    </div>


    <div id="clock">
        --:--
    </div>


</header>



<main id="workspace">


<!-- =========================
        TASKS
========================= -->


<section class="panel taskLarge" id="tasksPanel">


<div class="panelHeader">

<h2>
✅ Tasks
</h2>


<button class="addButton"
id="addTaskButton">
+
</button>


</div>


<div class="panelBody">

<div id="taskList"></div>

</div>


</section>





<!-- =========================
        STICKY NOTES
========================= -->


<section class="panel stickyPanel">


<div class="panelHeader">


<h2>
📝 Sticky Notes
</h2>


<button class="addButton"
id="addStickyButton">
+
</button>


</div>



<div class="panelBody">

<div id="stickyContainer"></div>

</div>


</section>

<!-- =========================
        BOTTOM ROW
========================= -->


<div class="bottomRow">



<!-- ERROR CODES -->

<section class="panel">


<div class="panelHeader">

<h2>
⚠ Error Codes
</h2>


<button class="addButton"
id="addErrorButton">
+
</button>


</div>



<div class="panelBody">

<div id="errorList"></div>

</div>


</section>






</div>



</main>





<footer id="bottomBar">

<div>

Everything saves automatically ✔

</div>

</footer>



</div>

    
<!-- =========================
        TEMPLATES
========================= -->


<template id="taskTemplate">


<div class="taskItem">


<input
type="checkbox"
class="taskCheck">



<input
type="text"
class="taskText"
placeholder="New task...">



<input
type="date"
class="taskDate">



<button class="deleteButton">
✕
</button>



</div>


</template>





<template id="stickyTemplate">


<div class="sticky">


<textarea
placeholder="Write note..."></textarea>



<input
type="date"
class="stickyDate">



<button class="deleteSticky">

✕

</button>


</div>


</template>






<template id="deadlineTemplate">


<div class="deadlineItem">


<input
type="text"
placeholder="Deadline">



<input
type="date">



<button class="deleteDeadline">

✕

</button>



</div>


</template>






<template id="errorTemplate">


<div class="errorItem">


<input
type="text"
placeholder="Error title">



<textarea
placeholder="Describe issue..."></textarea>



<input
type="date">



<button class="deleteError">

✕

</button>



</div>


</template>






<template id="groupTemplate">


<div class="groupItem">


<input
type="text"
placeholder="Project name">



<textarea
placeholder="Tasks..."></textarea>



<input
type="date">



<button class="deleteGroup">

✕

</button>



</div>


</template>





<script src="script.js"></script>


</body>


</html>
